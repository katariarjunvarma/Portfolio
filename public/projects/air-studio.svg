<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <radialGradient id="bgGrad" cx="38%" cy="52%" r="72%">
      <stop offset="0%" stop-color="#0d0d22"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <!-- Panel drop shadow -->
    <filter id="panelShadow" x="-20%" y="-5%" width="140%" height="110%">
      <feDropShadow dx="-4" dy="0" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="750" fill="url(#bgGrad)"/>
  <rect width="1200" height="750" fill="url(#grid)"/>

  <!-- Ambient colour bleeds -->
  <ellipse cx="420" cy="360" rx="320" ry="200" fill="#00e5ff" opacity="0.022" filter="url(#glowWide)"/>
  <ellipse cx="280" cy="440" rx="220" ry="180" fill="#ff00cc" opacity="0.028" filter="url(#glowWide)"/>
  <ellipse cx="800" cy="300" rx="280" ry="180" fill="#9900ff" opacity="0.025" filter="url(#glowWide)"/>

  <!-- ══ NEON BRUSH STROKES ══ -->
  <!-- Cyan sweep -->
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="#00e5ff" stroke-width="18" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.18"/>
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="#00e5ff" stroke-width="6" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.72"/>
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="#00e5ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Magenta S-curve -->
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="#ff00cc" stroke-width="16" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.15"/>
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="#ff00cc" stroke-width="5.5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.68"/>
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="#ff44cc" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Purple orbit -->
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1050 210, 940 165, 870 275 C 800 375, 1000 385, 1090 265"
        stroke="#cc44ff" stroke-width="14" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.16"/>
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1050 210, 940 165, 870 275 C 800 375, 1000 385, 1090 265"
        stroke="#cc44ff" stroke-width="5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.7"/>
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1050 210, 940 165, 870 275 C 800 375, 1000 385, 1090 265"
        stroke="#dd66ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.88"/>

  <!-- Yellow accent -->
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.12"/>
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffcc00" stroke-width="3" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.62"/>
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffe566" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Green accent -->
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#00ff99" stroke-width="8" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.1"/>
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#00ff99" stroke-width="2.5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.55"/>
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#88ffcc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle dots -->
  <g filter="url(#glow)">
    <circle cx="520" cy="310" r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="340" cy="530" r="2.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="960" cy="230" r="3"   fill="#00e5ff" opacity="0.9"/>
    <circle cx="160" cy="120" r="2"   fill="#ff00cc" opacity="0.85"/>
    <circle cx="730" cy="340" r="2.5" fill="#ffcc00" opacity="0.8"/>
    <circle cx="870" cy="275" r="2"   fill="#cc44ff" opacity="0.9"/>
    <circle cx="280" cy="220" r="2"   fill="#00ff99" opacity="0.75"/>
  </g>

  <!-- Hand landmark (right area) -->
  <g transform="translate(940, 360)" opacity="0.5">
    <line x1="60" y1="200" x2="30" y2="130" stroke="#00e5ff" stroke-width="1.5" opacity="0.65"/>
    <line x1="60" y1="200" x2="55" y2="110" stroke="#00e5ff" stroke-width="1.5" opacity="0.65"/>
    <line x1="60" y1="200" x2="80" y2="112" stroke="#00e5ff" stroke-width="1.5" opacity="0.65"/>
    <line x1="60" y1="200" x2="102" y2="128" stroke="#00e5ff" stroke-width="1.5" opacity="0.65"/>
    <line x1="60" y1="200" x2="118" y2="160" stroke="#00e5ff" stroke-width="1.5" opacity="0.65"/>
    <line x1="30" y1="130" x2="22" y2="78"  stroke="#00e5ff" stroke-width="1.2" opacity="0.55"/>
    <line x1="22" y1="78"  x2="16" y2="42"  stroke="#00e5ff" stroke-width="1"   opacity="0.45"/>
    <line x1="55" y1="110" x2="52" y2="56"  stroke="#00e5ff" stroke-width="1.2" opacity="0.55"/>
    <line x1="52" y1="56"  x2="50" y2="20"  stroke="#00e5ff" stroke-width="1"   opacity="0.45"/>
    <line x1="80" y1="112" x2="82" y2="62"  stroke="#00e5ff" stroke-width="1.2" opacity="0.55"/>
    <line x1="82" y1="62"  x2="84" y2="28"  stroke="#00e5ff" stroke-width="1"   opacity="0.45"/>
    <line x1="102" y1="128" x2="110" y2="82" stroke="#00e5ff" stroke-width="1.2" opacity="0.55"/>
    <line x1="110" y1="82"  x2="116" y2="55" stroke="#00e5ff" stroke-width="1"  opacity="0.45"/>
    <line x1="118" y1="160" x2="138" y2="132" stroke="#00e5ff" stroke-width="1.2" opacity="0.55"/>
    <line x1="138" y1="132" x2="152" y2="110" stroke="#00e5ff" stroke-width="1"  opacity="0.45"/>
    <circle cx="60"  cy="200" r="4.5" fill="#00e5ff"/>
    <circle cx="30"  cy="130" r="3.5" fill="#00e5ff"/>
    <circle cx="22"  cy="78"  r="3"   fill="#00e5ff"/>
    <circle cx="16"  cy="42"  r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="55"  cy="110" r="3.5" fill="#00e5ff"/>
    <circle cx="52"  cy="56"  r="3"   fill="#00e5ff"/>
    <circle cx="50"  cy="20"  r="3.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="80"  cy="112" r="3.5" fill="#00e5ff"/>
    <circle cx="82"  cy="62"  r="3"   fill="#00e5ff"/>
    <circle cx="84"  cy="28"  r="3.5" fill="#ffffff" opacity="0.85"/>
    <circle cx="102" cy="128" r="3"   fill="#00e5ff"/>
    <circle cx="110" cy="82"  r="2.5" fill="#00e5ff"/>
    <circle cx="116" cy="55"  r="2.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="118" cy="160" r="3.5" fill="#00e5ff"/>
    <circle cx="138" cy="132" r="3"   fill="#00e5ff"/>
    <circle cx="152" cy="110" r="3"   fill="#ffffff" opacity="0.85"/>
    <!-- Tracking ring around index fingertip -->
    <circle cx="16" cy="42" r="10" fill="none" stroke="#00e5ff" stroke-width="1"
            opacity="0.55" stroke-dasharray="3,3"/>
  </g>

  <!-- ══════════════════════════
       TOP NAVBAR
  ══════════════════════════ -->
  <rect width="1200" height="52" fill="#000000" opacity="0.82"/>
  <rect y="51" width="1200" height="1" fill="#ffffff" opacity="0.1"/>

  <!-- Logo: wave icon + AIR STUDIO -->
  <!-- Wave/tilde icon (∿) -->
  <path d="M 18 26 C 21 21, 25 21, 28 26 C 31 31, 35 31, 38 26"
        stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <text x="46" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="12" font-weight="700" letter-spacing="3" fill="#ffffff" opacity="0.9">AIR STUDIO</text>

  <!-- Center tabs -->
  <!-- Air Draw tab label -->
  <!-- Small play/arrow icon before text -->
  <path d="M 551 22 L 555 26 L 551 30 Z" fill="#00e5ff" opacity="0.9"/>
  <text x="560" y="32" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="600" fill="#00e5ff" letter-spacing="0.3">Air Draw</text>
  <!-- Active underline -->
  <rect x="551" y="47" width="74" height="2" rx="1" fill="#00e5ff" opacity="0.95"/>

  <!-- Separator -->
  <text x="644" y="31" font-family="sans-serif" font-size="12" fill="#ffffff" opacity="0.18">|</text>

  <!-- Air FX tab -->
  <!-- Sparkle/gear icon -->
  <text x="656" y="32" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.38">✦</text>
  <text x="671" y="32" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="400" fill="#ffffff" opacity="0.38" letter-spacing="0.3">Air FX</text>

  <!-- Camera ON -->
  <circle cx="22" cy="70" r="4.5" fill="#22ee88" filter="url(#glow)" opacity="0.9"/>
  <text x="34" y="74" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="500" fill="#22ee88" opacity="0.9" letter-spacing="0.5">Camera ON</text>

  <!-- ══════════════════════════
       RIGHT CONTROL PANEL
  ══════════════════════════ -->
  <!-- Panel background — rounded top -->
  <rect x="1117" y="55" width="83" height="688" rx="12" ry="12"
        fill="#111111" opacity="0.92" filter="url(#panelShadow)"/>
  <rect x="1117" y="55" width="83" height="688" rx="12" ry="12"
        fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- ── COLORS ── -->
  <text x="1130" y="86" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8" font-weight="600" letter-spacing="2.5" fill="#ffffff" opacity="0.4">COLORS</text>

  <!-- Row 1: cyan, magenta, green, blue -->
  <circle cx="1137" cy="105" r="11" fill="#00e5ff"/>
  <circle cx="1159" cy="105" r="11" fill="#ff00bb"/>
  <circle cx="1181" cy="105" r="11" fill="#33ff44"/>
  <circle cx="1181" cy="105" r="11" fill="url(#blueGrad)"/>

  <!-- Actually let me just use flat colors -->
  <circle cx="1137" cy="105" r="11" fill="#00d9ff"/>
  <circle cx="1159" cy="105" r="11" fill="#ff00bb"/>
  <circle cx="1181" cy="105" r="11" fill="#00cc44"/>
  <!-- blue is cut off — panel is 83px wide, so 4th circle at x=1203 is outside... let me adjust -->
  <!-- Panel x=1117, width=83, so right edge at 1200. Centers at 1130,1150,1170,1190 with r=9 -->
  <!-- Redo with r=9, spacing 20px -->
  <circle cx="1137" cy="105" r="10" fill="#00d9ff"/>
  <circle cx="1157" cy="105" r="10" fill="#ff00bb"/>
  <circle cx="1177" cy="105" r="10" fill="#33ee44"/>
  <circle cx="1197" cy="105" r="10" fill="#4488ff"/>

  <!-- Row 2: red, yellow, purple, white -->
  <circle cx="1137" cy="128" r="10" fill="#ff3366"/>
  <circle cx="1157" cy="128" r="10" fill="#ffcc00"/>
  <circle cx="1177" cy="128" r="10" fill="#bb44ff"/>
  <circle cx="1197" cy="128" r="10" fill="#ffffff"/>

  <!-- Active selection ring (cyan) -->
  <circle cx="1137" cy="105" r="13.5" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.9"/>

  <!-- ── BRUSH ── -->
  <text x="1130" y="162" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8" font-weight="600" letter-spacing="2.5" fill="#ffffff" opacity="0.4">BRUSH</text>

  <!-- Brush 1 (selected) — pen/calligraphy, in a rounded box -->
  <rect x="1127" y="170" width="20" height="20" rx="5" fill="#333333" opacity="0.9"/>
  <path d="M 1132 186 C 1134 180, 1140 172, 1143 173 C 1146 174, 1141 180, 1137 188"
        stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Brush 2 — thin line -->
  <path d="M 1153 188 L 1163 173" stroke="#ffffff" stroke-width="1.2"
        stroke-linecap="round" opacity="0.45"/>

  <!-- Brush 3 — A (calligraphy letter) -->
  <text x="1170" y="186" font-family="serif" font-size="12" fill="#ffffff" opacity="0.42"
        font-style="italic">A</text>

  <!-- Brush 4 — dotted line -->
  <path d="M 1183 181 L 1196 181" stroke="#ffffff" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2,3" opacity="0.4"/>

  <!-- Brush 5 — sparkle/star -->
  <text x="1127" y="206" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.38">✳</text>

  <!-- Brush 6 — thinner line -->
  <path d="M 1148 202 L 1160 202" stroke="#ffffff" stroke-width="0.8"
        stroke-linecap="round" opacity="0.35"/>

  <!-- ── THICKNESS / GLOW ── -->
  <!-- Labels side by side -->
  <text x="1125" y="232" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="1" fill="#ffffff" opacity="0.4">THICKNESS</text>
  <text x="1168" y="232" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="1" fill="#ffffff" opacity="0.4">GLOW</text>

  <!-- THICKNESS vertical slider track -->
  <rect x="1143" y="240" width="2" height="90" rx="1" fill="#ffffff" opacity="0.15"/>
  <!-- Thumb near bottom (6px = low value ~75% down) -->
  <rect x="1143" y="240" width="2" height="67" rx="1" fill="#ffffff" opacity="0.12"/>
  <circle cx="1144" cy="307" r="7" fill="#ffffff" opacity="0.92"/>

  <!-- GLOW vertical slider track -->
  <rect x="1178" y="240" width="2" height="90" rx="1" fill="#ffffff" opacity="0.15"/>
  <!-- Thumb at ~60% up -->
  <rect x="1178" y="240" width="2" height="36" rx="1" fill="#ffffff" opacity="0.12"/>
  <circle cx="1179" cy="276" r="7" fill="#ffffff" opacity="0.92"/>

  <!-- Values below sliders -->
  <text x="1134" y="342" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="9" fill="#ffffff" opacity="0.38" text-anchor="middle">6px</text>
  <text x="1179" y="342" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="9" fill="#ffffff" opacity="0.38" text-anchor="middle">60%</text>

  <!-- ── Divider ── -->
  <rect x="1127" y="352" width="63" height="0.7" fill="#ffffff" opacity="0.1"/>

  <!-- ── CANVAS ── -->
  <text x="1130" y="372" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8" font-weight="600" letter-spacing="2.5" fill="#ffffff" opacity="0.4">CANVAS</text>

  <!-- Grid icon -->
  <rect x="1130" y="382" width="16" height="16" rx="2" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
  <line x1="1138" y1="382" x2="1138" y2="398" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <line x1="1130" y1="390" x2="1146" y2="390" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>

  <!-- Asterisk / clear canvas -->
  <text x="1163" y="396" font-family="sans-serif" font-size="15" fill="#ffffff"
        opacity="0.38" text-anchor="middle">✳</text>

  <!-- ── Divider ── -->
  <rect x="1127" y="410" width="63" height="0.7" fill="#ffffff" opacity="0.1"/>

  <!-- ── Action icons row 1: undo, redo, delete ── -->
  <!-- Undo ↩ -->
  <path d="M 1138 432 C 1134 425, 1127 424, 1126 429 L 1126 423"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M 1126 423 L 1126 430 L 1133 430"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Redo ↪ -->
  <path d="M 1155 432 C 1159 425, 1166 424, 1167 429 L 1167 423"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M 1167 423 L 1167 430 L 1160 430"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Delete / trash -->
  <rect x="1181" y="422" width="11" height="12" rx="1" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.4"/>
  <line x1="1179" y1="421" x2="1194" y2="421" stroke="#ffffff" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>
  <line x1="1183" y1="419" x2="1190" y2="419" stroke="#ffffff" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>
  <line x1="1184" y1="425" x2="1184" y2="431" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="1187" y1="425" x2="1187" y2="431" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="1190" y1="425" x2="1190" y2="431" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- ── Action icons row 2: copy/export-frame, download, info ── -->
  <!-- Export frame icon (rounded square with arrow) -->
  <rect x="1128" y="452" width="13" height="13" rx="2" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.4"/>
  <path d="M 1133 449 L 1133 443 L 1144 443 L 1144 454 L 1141 454"
        stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Download ⬇ -->
  <path d="M 1158 452 L 1158 460 M 1154 457 L 1158 462 L 1162 457"
        stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <line x1="1153" y1="464" x2="1163" y2="464" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>

  <!-- Info ⓘ -->
  <circle cx="1185" cy="458" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.4"/>
  <text x="1185" y="462" font-family="-apple-system, sans-serif" font-size="8"
        fill="#ffffff" opacity="0.45" text-anchor="middle">i</text>

  <!-- ── Divider ── -->
  <rect x="1127" y="480" width="63" height="0.7" fill="#ffffff" opacity="0.1"/>

  <!-- ── Bottom arrow → ── -->
  <path d="M 1148 502 L 1165 502 M 1159 497 L 1165 502 L 1159 507"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.38"/>

  <!-- ══ Bottom "Show hand" pill ══ -->
  <rect x="450" y="697" width="300" height="40" rx="20" fill="#111111" opacity="0.9"/>
  <rect x="450" y="697" width="300" height="40" rx="20" fill="none"
        stroke="#ffffff" stroke-width="0.6" opacity="0.1"/>
  <text x="600" y="723" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle" opacity="0.82"
        letter-spacing="0.3">👋  Show hand</text>

  <!-- ── Vignette ── -->
  <rect width="1200" height="750" fill="url(#vignette)"/>
</svg>
