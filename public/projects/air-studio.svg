<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <radialGradient id="bgGrad" cx="38%" cy="52%" r="72%">
      <stop offset="0%" stop-color="#0d0d22"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>

    <!-- Neon glow — tight -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Neon glow — wide halo -->
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle dot glow -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Subtle grid -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Cyan stroke gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Magenta stroke gradient -->
    <linearGradient id="magGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ff00cc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cc00ff" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Purple gradient -->
    <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9f00ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#cc44ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff44aa" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="750" fill="url(#bgGrad)"/>
  <rect width="1200" height="750" fill="url(#grid)"/>

  <!-- ── Ambient color bleeds from strokes ── -->
  <ellipse cx="420" cy="360" rx="320" ry="200" fill="#00e5ff" opacity="0.025" filter="url(#glowWide)"/>
  <ellipse cx="280" cy="440" rx="220" ry="180" fill="#ff00cc" opacity="0.03" filter="url(#glowWide)"/>
  <ellipse cx="820" cy="300" rx="280" ry="180" fill="#9900ff" opacity="0.03" filter="url(#glowWide)"/>

  <!-- ══════════════════════════════════════
       NEON BRUSH STROKES
  ══════════════════════════════════════ -->

  <!-- Stroke 1 — Cyan calligraphy sweep (main hero stroke) -->
  <!-- Wide halo -->
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="#00e5ff" stroke-width="18" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.18"/>
  <!-- Mid glow -->
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="#00e5ff" stroke-width="7" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.7"/>
  <!-- Sharp core -->
  <path d="M 80 580 C 180 420, 320 200, 520 310 C 680 390, 780 520, 960 230"
        stroke="url(#cyanGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Stroke 2 — Magenta S-curve -->
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="#ff00cc" stroke-width="16" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.15"/>
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="#ff00cc" stroke-width="6" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.65"/>
  <path d="M 160 120 C 280 280, 120 420, 340 530 C 500 610, 680 460, 740 620"
        stroke="url(#magGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Stroke 3 — Purple loop/orbit -->
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1060 200, 940 160, 870 270 C 800 370, 1000 380, 1100 260"
        stroke="#cc44ff" stroke-width="14" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.16"/>
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1060 200, 940 160, 870 270 C 800 370, 1000 380, 1100 260"
        stroke="#cc44ff" stroke-width="5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.7"/>
  <path d="M 660 660 C 720 480, 900 420, 980 310 C 1060 200, 940 160, 870 270 C 800 370, 1000 380, 1100 260"
        stroke="url(#purpGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.88"/>

  <!-- Stroke 4 — Gold/yellow thin accent -->
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.12"/>
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffcc00" stroke-width="3.5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.6"/>
  <path d="M 480 690 C 540 560, 680 460, 730 340 C 780 220, 860 280, 1020 360"
        stroke="#ffe566" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Stroke 5 — Mint green small accent -->
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#00ff99" stroke-width="8" fill="none" stroke-linecap="round"
        filter="url(#glowWide)" opacity="0.1"/>
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#00ff99" stroke-width="2.5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.55"/>
  <path d="M 40 280 C 120 230, 220 310, 280 220 C 340 130, 430 180, 490 260"
        stroke="#88ffcc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ── Glitter / sparkle dots ── -->
  <g filter="url(#glow)">
    <circle cx="520" cy="310" r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="340" cy="530" r="2.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="960" cy="230" r="3" fill="#00e5ff" opacity="0.9"/>
    <circle cx="160" cy="120" r="2" fill="#ff00cc" opacity="0.85"/>
    <circle cx="730" cy="340" r="2.5" fill="#ffcc00" opacity="0.8"/>
    <circle cx="870" cy="270" r="2" fill="#cc44ff" opacity="0.9"/>
    <circle cx="280" cy="220" r="2" fill="#00ff99" opacity="0.75"/>
    <circle cx="1100" cy="260" r="2.5" fill="#cc44ff" opacity="0.7"/>
  </g>

  <!-- ══════════════════════════════════════
       HAND LANDMARK OVERLAY (right side)
  ══════════════════════════════════════ -->
  <g transform="translate(980, 380)" opacity="0.55">
    <!-- Wrist -->
    <circle cx="60" cy="200" r="4.5" fill="#00e5ff"/>
    <!-- Palm base connections -->
    <line x1="60" y1="200" x2="30" y2="130" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="200" x2="55" y2="110" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="200" x2="80" y2="110" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="200" x2="102" y2="125" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="200" x2="118" y2="158" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
    <!-- Index finger -->
    <line x1="30" y1="130" x2="22" y2="78" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="22" y1="78" x2="16" y2="40" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <circle cx="30" cy="130" r="3.5" fill="#00e5ff" opacity="0.8"/>
    <circle cx="22" cy="78" r="3" fill="#00e5ff" opacity="0.7"/>
    <circle cx="16" cy="40" r="3.5" fill="#ffffff" opacity="0.95"/>
    <!-- Middle finger -->
    <line x1="55" y1="110" x2="52" y2="55" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="52" y1="55" x2="50" y2="18" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <circle cx="55" cy="110" r="3.5" fill="#00e5ff" opacity="0.8"/>
    <circle cx="52" cy="55" r="3" fill="#00e5ff" opacity="0.7"/>
    <circle cx="50" cy="18" r="3" fill="#ffffff" opacity="0.9"/>
    <!-- Ring finger -->
    <line x1="80" y1="110" x2="82" y2="62" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="82" y1="62" x2="84" y2="28" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <circle cx="80" cy="110" r="3.5" fill="#00e5ff" opacity="0.8"/>
    <circle cx="82" cy="62" r="3" fill="#00e5ff" opacity="0.7"/>
    <circle cx="84" cy="28" r="3" fill="#ffffff" opacity="0.85"/>
    <!-- Pinky -->
    <line x1="102" y1="125" x2="110" y2="82" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="110" y1="82" x2="116" y2="55" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <circle cx="102" cy="125" r="3" fill="#00e5ff" opacity="0.8"/>
    <circle cx="110" cy="82" r="2.5" fill="#00e5ff" opacity="0.65"/>
    <circle cx="116" cy="55" r="2.5" fill="#ffffff" opacity="0.8"/>
    <!-- Thumb -->
    <line x1="118" y1="158" x2="138" y2="130" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="138" y1="130" x2="152" y2="108" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <circle cx="118" cy="158" r="3.5" fill="#00e5ff" opacity="0.8"/>
    <circle cx="138" cy="130" r="3" fill="#00e5ff" opacity="0.7"/>
    <circle cx="152" cy="108" r="3" fill="#ffffff" opacity="0.85"/>
    <!-- Tracking circle around tip -->
    <circle cx="16" cy="40" r="10" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.6" stroke-dasharray="3,3"/>
  </g>

  <!-- ══════════════════════════════════════
       UI CHROME
  ══════════════════════════════════════ -->

  <!-- Top navigation bar -->
  <rect width="1200" height="52" fill="#000000" opacity="0.78"/>
  <rect y="51" width="1200" height="1" fill="#ffffff" opacity="0.08"/>

  <!-- Logo -->
  <text x="22" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="700" letter-spacing="3.5" fill="#ffffff" opacity="0.92">
    ✦  AIR STUDIO
  </text>

  <!-- Active tab indicator line -->
  <rect x="512" y="46" width="90" height="2" rx="1" fill="#00e5ff" opacity="0.9"/>

  <!-- Air Draw tab (active) -->
  <text x="557" y="32" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="600" fill="#00e5ff" text-anchor="middle" letter-spacing="0.3">Air Draw</text>

  <!-- Separator -->
  <text x="640" y="32" font-family="sans-serif" font-size="13" fill="#ffffff" opacity="0.2" text-anchor="middle">|</text>

  <!-- Air FX tab (inactive) -->
  <text x="700" y="32" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.42" letter-spacing="0.3">Air FX</text>

  <!-- Camera ON status -->
  <circle cx="22" cy="72" r="4.5" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <text x="34" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="500" fill="#00ff88" opacity="0.85" letter-spacing="0.5">Camera ON</text>

  <!-- ── Right control panel ── -->
  <rect x="1122" y="52" width="78" height="698" fill="#050508" opacity="0.82"/>
  <rect x="1122" y="52" width="1" height="698" fill="#ffffff" opacity="0.07"/>

  <!-- Colors label -->
  <text x="1136" y="88" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="2.5" fill="#ffffff" opacity="0.38">COLORS</text>

  <!-- 2×4 color swatch grid -->
  <circle cx="1145" cy="108" r="10" fill="#00e5ff"/>
  <circle cx="1168" cy="108" r="10" fill="#ff00cc"/>
  <circle cx="1191" cy="108" r="10" fill="#00ff44"/>
  <circle cx="1145" cy="132" r="10" fill="#ffe000"/>
  <circle cx="1168" cy="132" r="10" fill="#ff4444"/>
  <circle cx="1191" cy="132" r="10" fill="#aa44ff"/>
  <circle cx="1145" cy="156" r="10" fill="#ff8800"/>
  <circle cx="1168" cy="156" r="10" fill="#ffffff"/>
  <!-- Active ring on cyan -->
  <circle cx="1145" cy="108" r="13.5" fill="none" stroke="#00e5ff" stroke-width="1.8" opacity="0.85"/>

  <!-- Brush label -->
  <text x="1136" y="192" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="2.5" fill="#ffffff" opacity="0.38">BRUSH</text>

  <!-- Brush icons (simplified) -->
  <path d="M 1140 210 Q 1148 205 1158 215" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 1165 205 Q 1175 200 1180 218" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 1185 208 Q 1192 203 1197 216" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round" stroke-dasharray="2,2"/>

  <!-- Thickness label -->
  <text x="1136" y="250" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="1.5" fill="#ffffff" opacity="0.38">THICKNESS</text>
  <!-- Slider track -->
  <rect x="1138" y="262" width="52" height="2" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="1138" y="262" width="28" height="2" rx="1" fill="#00e5ff" opacity="0.7"/>
  <circle cx="1166" cy="263" r="6" fill="#ffffff" opacity="0.9"/>

  <!-- Glow label -->
  <text x="1136" y="292" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="1.5" fill="#ffffff" opacity="0.38">GLOW</text>
  <rect x="1138" y="304" width="52" height="2" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="1138" y="304" width="38" height="2" rx="1" fill="#00e5ff" opacity="0.7"/>
  <circle cx="1176" cy="305" r="6" fill="#ffffff" opacity="0.9"/>

  <!-- Canvas label -->
  <text x="1136" y="342" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="8.5" font-weight="600" letter-spacing="1.5" fill="#ffffff" opacity="0.38">CANVAS</text>

  <!-- Icon row: grid / clear / undo / redo / save -->
  <rect x="1138" y="355" width="14" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
  <line x1="1145" y1="355" x2="1145" y2="369" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <line x1="1138" y1="362" x2="1152" y2="362" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>

  <text x="1163" y="368" font-family="sans-serif" font-size="13" fill="#ffffff" opacity="0.35" text-anchor="middle">✕</text>

  <!-- Undo arrow -->
  <path d="M 1181 367 C 1178 360, 1172 358, 1169 362 L 1169 356" stroke="#ffffff" stroke-width="1.3" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Redo arrow -->
  <path d="M 1191 367 C 1194 360, 1200 358, 1200 362 L 1200 356" stroke="#ffffff" stroke-width="1.3" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Bottom "Show hand" pill ── -->
  <rect x="450" y="695" width="300" height="42" rx="21" fill="#111111" opacity="0.88"/>
  <rect x="450" y="695" width="300" height="42" rx="21" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.12"/>
  <text x="600" y="722" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle" opacity="0.82" letter-spacing="0.3">
    👋  Show hand
  </text>

  <!-- ── Subtle vignette ── -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1200" height="750" fill="url(#vignette)"/>
</svg>
